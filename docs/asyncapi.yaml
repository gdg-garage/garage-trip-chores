asyncapi: 3.0.0
info:
  title: Garage Trip Chores WebSocket API
  version: 1.0.0
  description: Real-time updates for chores and assignments.
servers:
  dev:
    host: localhost:8080
    pathname: /ws
    protocol: ws
    description: Initial configuration WebSocket server implementation

channels:
  events:
    address: /ws
    messages:
      subscribe:
        $ref: '#/components/messages/AuthMessage'
      publish:
        $ref: '#/components/messages/EventMessage'

components:
  messages:
    AuthMessage:
      name: AuthMessage
      summary: The first message sent by the client to authenticate (from API config keys).
      payload:
        type: object
        required:
          - api_key
        properties:
          api_key:
            type: string
            description: Valid API key mapped globally
    EventMessage:
      name: EventMessage
      summary: State change events iteratively generated from Chore assignments globally
      payload:
        type: object
        required:
          - type
        properties:
          type:
            type: string
            enum:
              - task_created
              - task_updated
              - task_done
              - task_assigned
              - task_acked
              - task_refused
              - task_timeout
          chore:
            $ref: '#/components/schemas/Chore'
          assignment:
            $ref: '#/components/schemas/Assignment'
  
  schemas:
    Chore:
      type: object
      properties:
        ID:
          type: integer
        Name:
          type: string
        NecessaryWorkers:
          type: integer
        EstimatedTimeMin:
          type: integer
        AssignmentTimeoutMin:
          type: integer
        CreatorId:
          type: string
        Created:
          type: string
          format: date-time
        Completed:
          type: string
          format: date-time
        Cancelled:
          type: string
          format: date-time
        Deadline:
          type: string
          format: date-time
    Assignment:
      type: object
      properties:
        ID:
          type: integer
        UserId:
          type: string
        ChoreId:
          type: integer
        Created:
          type: string
          format: date-time
        Acked:
          type: string
          format: date-time
        Refused:
          type: string
          format: date-time
        Timeouted:
          type: string
          format: date-time
